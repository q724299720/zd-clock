name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Install Android SDK Platform 35
      run: |
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
        sdkmanager --list_installed | grep -E "platforms|build-tools" | tail -10

    - name: Build Release APK
      run: cd android && ./gradlew assembleRelease -PtargetSdkVersion=34 -x lint -x lintVitalRelease --stacktrace 2>&1 | tee build.log

    - name: Print build error on failure
      if: failure()
      run: |
        echo "=== GRADLE BUILD FAILED ==="
        tail -120 android/build.log 2>/dev/null || echo "no build.log"
        echo "=== GRADLE DAEMON LOGS ==="
        cat ~/.gradle/daemon/*/daemon-*.out.log 2>/dev/null | tail -80 || true
        echo "=== ANDROID SDK STATUS ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la "$ANDROID_HOME"/build-tools/ 2>/dev/null || true
        ls -la "$ANDROID_HOME"/platforms/ 2>/dev/null | grep -E "android-(35|36)" || true

    - name: List APK files
      if: success()
      run: |
        echo "=== Listing APK files ==="
        find android/app/build/outputs -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        echo "=== Listing release dir ==="
        ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"

    - name: Upload release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: zd-clock-release-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Upload to Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: 正点闹钟 v1.0.0
        files: android/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
